<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>
    <style>
        .grid{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 5fr 2fr 2fr 2fr;
            height: 700px;
        }
        .box{
            background-color: tomato;
            border: 2px solid black;
        }
        .header{
            grid-column: 1/2;
            grid-row: 1/2;
        }
        .menu{
            grid-column: 2/5;
            grid-row: 1/2;
        }
        .hero{
            grid-column: 1/5;
            grid-row: 2/3;
        }
        .main{
            grid-column: 1/3;
            grid-row: 3/5;
        }
        .image{
            grid-column: 4/5;
            grid-row: 3/4;
        }
        .extra{
            grid-column: 4/5;
            grid-row: 4/5;
        }
        .banner{
            grid-column: 1/5;
            grid-row: 5/6;
        }
    </style>

</head>
<body>
      
<div class="grid">
    <div class="box header">Box 1 (Header)</div>
    <div class="box menu">Box 2 (Sidebar)</div>
    <div class="box hero">Box 3 (Main Content)</div>
    <div class="box main">Box 4 (Right Panel)</div>
    <div class="box image">Box 5 (Feature A)</div>
    <div class="box extra">Box 6 (Feature B)</div>
    <div class="box banner">Box 7 (Footer)</div>
</div>


    
</body>
</html>
